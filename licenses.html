          <div class="row clearfix certificate-grid">

      <div
        id="certificate-lightbox"
        style="
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.8);
          z-index: 9999;
          align-items: center;
          justify-content: center;
        "
      >
        <div
          style="
            position: relative;
            width: 90%;
            height: 90%;
            max-width: 1000px;
            background: #111;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
          "
        >
          <button
            id="certificate-lightbox-close"
            aria-label="Закрыть"
            style="
              position: absolute;
              top: 8px;
              right: 12px;
              background: transparent;
              border: 0;
              color: #fff;
              font-size: 32px;
              line-height: 1;
              cursor: pointer;
            "
          >
            ×
          </button>
          <iframe
            id="certificate-lightbox-frame"
            src=""
            style="border: 0; width: 100%; height: 100%"
          ></iframe>
        </div>
      </div>

    <script src="js/jquery.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/owl.js"></script>
    <script src="js/script.js"></script>
    <script>
      (function () {
        var container = document.querySelector(".certificate-image");
        if (container) {
          container.addEventListener("click", function () {
            var src = container.getAttribute("data-src");
            var box = document.getElementById("certificate-lightbox");
            var frame = document.getElementById("certificate-lightbox-frame");
            if (src && box && frame) {
              frame.src = src;
              box.style.display = "flex";
              document.body.classList.add("modal-open");
            }
          });
        }
        var closeBtn = document.getElementById("certificate-lightbox-close");
        var overlay = document.getElementById("certificate-lightbox");
        function closeLightbox() {
          var frame = document.getElementById("certificate-lightbox-frame");
          if (frame) frame.src = "";
          if (overlay) overlay.style.display = "none";
          document.body.classList.remove("modal-open");
        }
        if (closeBtn) closeBtn.addEventListener("click", closeLightbox);
        if (overlay)
          overlay.addEventListener("click", function (e) {
            if (e.target === overlay) closeLightbox();
          });
        document.addEventListener("keyup", function (e) {
          if (e.key === "Escape") closeLightbox();
        });
      })();
    </script>
